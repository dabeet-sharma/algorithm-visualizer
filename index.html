<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Dabeet's Algorithm Visualizer</title>
        <!-- Connect CSS file to the HTML -->
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <header>
            <h1>Algorithm Visualizer</h1>
        </header>

        <section class="controls">
            <label for="algorithmSelect">Algorithm</label>
            <select id="algorithmSelect">
                <option value="bubble">Bubble Sort</option>
                <option value="selection">Selection Sort</option>
                <option value="insertion">Insertion Sort</option>
                <option value="merge">Merge Sort</option>
                <option value="quick">Quick Sort</option>
            </select>
            
            <button id="generateBtn">
                Generate New Array
            </button>
            <button id="startBtn">
                Start Sorting
            </button>
            <label for="speedRange">
                Fast
            </label>
            <input type="range" id="speedRange" min="10" max="100" value="30" /> Slow 
        </section>

        <!-- Render Bars  -->
        <section id="barContainer" class="bar-container"></section>

        <script type="module" src="app.js"></script>
    </body>
</html>
